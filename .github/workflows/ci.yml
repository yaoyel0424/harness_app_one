name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "1.8.5"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: poetry
      - name: 安装 Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}
      - name: 安装依赖
        run: poetry install --with dev --no-interaction
      - name: Ruff check
        run: poetry run ruff check src tests
      - name: Ruff format check
        run: poetry run ruff format --check src tests

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: poetry
      - run: pip install poetry==${{ env.POETRY_VERSION }}
      - run: poetry install --with dev --no-interaction
      - run: poetry run mypy

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: poetry
      - run: pip install poetry==${{ env.POETRY_VERSION }}
      - run: poetry install --with dev --no-interaction
      - name: Bandit
        run: poetry run bandit -r src -c pyproject.toml
      - name: pip-audit
        run: poetry run pip-audit
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  architecture:
    name: Architecture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: poetry
      - run: pip install poetry==${{ env.POETRY_VERSION }}
      - run: poetry install --with dev --no-interaction
      - run: poetry run lint-imports
      - run: poetry run pytest tests/architecture -m architecture

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: poetry
      - run: pip install poetry==${{ env.POETRY_VERSION }}
      - run: poetry install --with dev --no-interaction
      - run: poetry run pytest tests/unit -n auto --cov --cov-report=xml
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
        continue-on-error: true

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: poetry
      - run: pip install poetry==${{ env.POETRY_VERSION }}
      - run: poetry install --with dev --no-interaction
      - run: poetry run pytest tests/integration -m integration

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: poetry
      - run: pip install poetry==${{ env.POETRY_VERSION }}
      - run: poetry install --with dev --no-interaction
      - run: poetry run cyclonedx-py poetry -o sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: myapp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docs:
    name: MkDocs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: poetry
      - run: pip install poetry==${{ env.POETRY_VERSION }}
      - run: poetry install --with dev --no-interaction
      - run: poetry run mkdocs build --strict
