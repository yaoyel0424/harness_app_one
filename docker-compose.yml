# ---------------------------------------------------------------------------
# 应用 + PostgreSQL（本地开发与集成测试）
# ---------------------------------------------------------------------------
services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://myapp:myapp@postgres:5432/myapp
      LOG_LEVEL: INFO
      LOG_FILE: /var/log/myapp/myapp.jsonl
      OTEL_ENABLED: "false"
    volumes:
      - ./logs:/var/log/myapp
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: myapp
      POSTGRES_PASSWORD: myapp
      POSTGRES_DB: myapp
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myapp -d myapp"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-net

volumes:
  postgres_data:

networks:
  app-net:
    driver: bridge
