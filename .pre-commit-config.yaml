# ---------------------------------------------------------------------------
# pre-commit：Git 提交前自动质量检查
# ---------------------------------------------------------------------------
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -r, src]
        pass_filenames: false

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: poetry run mypy
        language: system
        pass_filenames: false
        always_run: true
      - id: gitleaks
        name: gitleaks
        entry: poetry run python scripts/gitleaks_precommit.py
        language: system
        pass_filenames: false
        always_run: true
      - id: import-linter
        name: import-linter
        entry: poetry run lint-imports
        language: system
        pass_filenames: false
        always_run: true
