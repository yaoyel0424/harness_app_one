apiVersion: 1

# Contact Point 路由：
# - MyAppErrorLogSpike（Loki）→ oncall-relay → log-alert 自动修复
# - MyAppPromtailLogNotify（Promtail 采集流）→ log-notify-only → 邮件/飞书（需配置 SMTP 或改 Webhook）
contactPoints:
  - orgId: 1
    name: oncall-relay
    receivers:
      - uid: oncall_relay_webhook
        type: webhook
        settings:
          url: http://oncall-relay:8787/webhook
          httpMethod: POST
        disableResolveMessage: false

  - orgId: 1
    name: log-notify-only
    receivers:
      - uid: log_notify_email
        type: email
        settings:
          addresses: ops@example.com
          singleEmail: false
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: log-notify-only
    group_by:
      - alertname
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: oncall-relay
        matchers:
          - alertname = MyAppErrorLogSpike
      - receiver: log-notify-only
        matchers:
          - alertname = MyAppPromtailLogNotify
