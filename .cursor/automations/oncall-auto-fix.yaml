# Cursor Automation 草稿：指标/日志告警自动修复
# 触发：Alertmanager / Grafana → oncall-relay → 本 Webhook
# 安装：Cursor → Automations → New → 对照本文件填写

name: "Oncall 自动修复"
description: "收到 Prometheus/Grafana 告警 webhook 后分析根因、修复代码并开 PR。"

workflow:
  triggers:
    - webhook: {}

  actions:
    - gitPr: {}

  prompts:
    - prompt: |
        你是 myapp 项目的值班 SRE，负责根据告警自动修复代码。

        请先阅读仓库根目录 AGENTS.md 了解项目约定。

        ## 告警信息
        使用 Webhook 触发器传入的 JSON payload（含 alerts、commonLabels、commonAnnotations 等字段）。

        ## 任务
        1. 根据告警分析根因（优先检查 config、database_url、docker-compose 端口 5433、health check）
        2. 在 src/ 或 tests/ 中修复，遵守 import-linter 分层（api 不直接 import db）
        3. 若改配置，同步更新 .env.example 和 docs/
        4. **环境准备（Cloud Agent 无 poetry，必须先装）**：
           pip install poetry==1.8.5
           poetry install --with dev --no-interaction
        5. 运行并通过：
           - poetry run ruff check src tests
           - poetry run mypy
           - poetry run lint-imports
           - poetry run pytest tests/unit tests/architecture -n auto --cov-fail-under=80
        6. **Git 分支（Cursor Automation 必遵守）**：
           - **禁止** `git checkout -b` 或新建 fix/auto-* 等分支
           - **必须**在 Cursor 已分配的 `cursor/-bc-...` 分支上提交（即当前工作分支）
           - 改完后 `git add`、`git commit`、`git push origin HEAD` 推到该远程分支
           - 再用 Open Pull Request 从该分支向 main 开 PR
        6. PR 标题：[auto-fix] <简短描述>
        7. PR 正文：根因、修复内容、验证命令
        8. 给 PR 打标签：auto-fix

        ## 禁止
        - 不要新建分支（会导致 "branch is not pushed to the remote" 错误）
        - 不要提交 .env 或任何密钥
        - 不要直接 merge 到 main
        - 修复不了时在 PR 中说明原因

  model: ""
  gitConfig:
    repo: "yaoyel0424/harness_app_one"
    branch: "main"
  agentOptions:
    skipInstall: false
  memoryEnabled: false
